name: Remy
options:
  bundleIdPrefix: com.lstsk
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  RemyHost:
    type: application
    platform: iOS
    sources:
      - RemyHost
    dependencies:
      - target: RemyMessagesExtension
        embed: true
    info:
      path: RemyHost/Info.plist
      properties:
        CFBundleDisplayName: Remy
        UILaunchScreen: {}
        NSContactsUsageDescription: Remy uses your contacts to match friends you mention in splits.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lstsk.remy
  RemyMessagesExtension:
    type: app-extension
    platform: iOS
    sources:
      - RemyMessagesExtension
    info:
      path: RemyMessagesExtension/Info.plist
      properties:
        CFBundleDisplayName: Remy
        NSExtension:
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessagesViewController
        NSContactsUsageDescription: Remy uses your contacts to match friends you mention in splits.
        REMY_API_BASE_URL: http://127.0.0.1:8787
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lstsk.remy.MessagesExtension
