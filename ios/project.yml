name: Remy
options:
  bundleIdPrefix: com.lstsk
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "QCW9XJC54W"
targets:
  RemyApp:
    type: application
    platform: iOS
    sources:
      - RemyApp
      - Shared
    info:
      path: RemyApp/Info.plist
      properties:
        CFBundleDisplayName: Remy
        UILaunchScreen: {}
    entitlements:
      path: RemyApp/RemyApp.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:YOUR_DOMAIN_HERE
          - appclips:YOUR_DOMAIN_HERE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lstsk.remy
  RemyAppClip:
    type: application
    platform: iOS
    sources:
      - RemyAppClip
      - Shared
    info:
      path: RemyAppClip/Info.plist
      properties:
        CFBundleDisplayName: Remy
        UILaunchScreen: {}
        NSAppClip:
          NSAppClipRequestEphemeralUserNotification: false
          NSAppClipRequestLocationConfirmation: false
    entitlements:
      path: RemyAppClip/RemyAppClip.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:YOUR_DOMAIN_HERE
          - appclips:YOUR_DOMAIN_HERE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lstsk.remy.Clip
